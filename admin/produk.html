<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produk Admin — Nura Baby Care</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style_admin.css" />
</head>
<body>
  <input type="checkbox" id="adminSidebarToggle" class="admin-sidebar-toggle" hidden />

  <header class="site-header">
    <div class="container navbar-admin">
      <div class="brand" aria-label="Nura Baby Care">
        <img class="brand-logo" src="../images/logo/baby-logo.png" alt="Nura Baby Care" onerror="this.style.display='none'" />
        <div>
          <div class="brand-title">Nura Baby Care</div>
          <div class="brand-subtitle">Backoffice Admin</div>
        </div>
      </div>

      <div class="admin-actions">
        <button class="icon-btn btn-hamburger" type="button" aria-label="Buka menu" for="adminSidebarToggle">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span class="hide-sm admin-greeting">Halo, <span id="adminName">-</span></span>
        <button id="btnLogoutAdmin" class="btn btn-ghost" type="button"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>
  </header>

  <aside class="admin-sidebar">
    <div class="sidebar-head">
      <div class="sidebar-brand">
        <div class="sidebar-badge"><i class="fa-solid fa-shield-halved"></i></div>
        <div>
          <div class="sidebar-brand-name">Nura Baby Care</div>
          <div class="sidebar-brand-role">Admin</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Menu Admin">
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-icon">📊</span><span class="sidebar-label">Dashboard</span></a>
      <a class="sidebar-item active" href="produk.html"><span class="sidebar-icon">📦</span><span class="sidebar-label">Produk</span></a>
      <a class="sidebar-item" href="stok.html"><span class="sidebar-icon">📥</span><span class="sidebar-label">Stok</span></a>
      <a class="sidebar-item" href="pesanan.html"><span class="sidebar-icon">📋</span><span class="sidebar-label">Pesanan</span></a>
    </nav>
  </aside>

  <label class="admin-sidebar-backdrop" for="adminSidebarToggle" aria-hidden="true"></label>
  <div class="mobile-overlay" aria-hidden="true"></div>

  <main class="admin-main" id="main">
    <div class="container admin-container">
      <section class="admin-hero">
        <div class="section-head" style="margin-bottom:10px;">
          <h2><i class="fa-solid fa-box"></i> Kelola Produk</h2>
          <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
            <a class="btn btn-primary" href="tambah_produk.html"><i class="fa-solid fa-circle-plus"></i> Tambah Produk</a>
          </div>
        </div>
      </section>

      <section class="admin-section">
        <div class="card">
          <div class="grid2" style="margin-top:2px;">
            <div class="form-group">
              <label for="filterSearch">Cari</label>
              <input id="filterSearch" type="search" placeholder="nama produk..." />
            </div>
            <div class="form-group">
              <label for="filterCategory">Kategori</label>
              <select id="filterCategory"></select>
            </div>
          </div>

          <div class="table" style="margin-top:14px">
            <div class="table-row table-head">
              <div>Produk</div>
              <div>Harga</div>
              <div class="hide-sm">Stok</div>
              <div class="hide-md">Rating</div>
              <div style="text-align:right">Aksi</div>
            </div>
            <div id="adminProductList"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer style="padding:18px 0; text-align:center; color:rgba(43,27,34,.65); font-weight:900;">
      © <span id="year"></span>
      <a href="https://www.instagram.com/nrrrsydhh/" 
        target="_blank"
        style="color:inherit; text-decoration:none;">
        Develop by Nurr
      </a>
    </footer>



  <script src="script_admin.js"></script>
  <script src="sidebar_mobile_fix.js"></script>
</body>
</html>
