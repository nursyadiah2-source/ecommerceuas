  <script>
    // Statistik dari LocalStorage (produk & stok menipis) + pesanan dari ecosmet_orders.
    // Menghitung Total Pendapatan hanya dari pesanan dengan status 'Selesai'.
    (function(){
      try{
        const LS = {
          PRODUCTS: 'ecosmet_products',
          ORDERS: 'ecosmet_orders'
        };

        const safeParse = (raw, fallback) => { try{ return JSON.parse(raw || '') ?? fallback; }catch{ return fallback; } };

        const totalProdukEl = document.getElementById('statTotalProduk');
        const stokMenipisEl = document.getElementById('statStokMenipis');
        const totalPesananEl = document.getElementById('statTotalPesanan');
        const totalPendapatanEl = document.getElementById('statTotalPendapatan');

        function formatRupiah(n){
          const num = Number(n||0) || 0;
          return 'Rp ' + num.toLocaleString('id-ID');
        }

        function computeAndRender(){
          const products = safeParse(localStorage.getItem(LS.PRODUCTS), []);
          const orders = safeParse(localStorage.getItem(LS.ORDERS), []);

          if(totalProdukEl) totalProdukEl.textContent = String(Array.isArray(products) ? products.length : 0);

          const lowThreshold = 5;
          const lowCount = (Array.isArray(products) ? products : [])
            .filter(p => Number(p?.stock ?? 0) > 0 && Number(p?.stock ?? 0) <= lowThreshold)
            .length;
          if(stokMenipisEl) stokMenipisEl.textContent = String(lowCount);

          const totalOrders = Array.isArray(orders) ? orders.length : 0;
          if(totalPesananEl) totalPesananEl.textContent = String(totalOrders);

          // Hitung total pendapatan hanya dari pesanan dengan status 'Selesai'
          let totalPendapatan = 0;
          if(Array.isArray(orders)){
            for(const o of orders){
              const st = String(o?.status || '').trim();
              if(st === 'Selesai'){
                const t = Number(o?.total || 0) || 0;
                totalPendapatan += t;
              }
            }
          }

          if(totalPendapatanEl) totalPendapatanEl.textContent = formatRupiah(totalPendapatan);
        }

        // jalankan sekali saat load
        computeAndRender();

        // Jika localStorage berubah (mis. admin mengubah status di tab Pesanan dan menekan Update),
        // event storage akan dipicu di tab lain -> update statistik otomatis.
        window.addEventListener('storage', (e) => {
          if(!e) return;
          if(e.key === LS.ORDERS || e.key === LS.PRODUCTS || e.key === null){
            computeAndRender();
          }
        });

      }catch(e){
        // keep '-' jika gagal, tapi umumnya tetap akan terisi.
      }
    })();
  </script>
